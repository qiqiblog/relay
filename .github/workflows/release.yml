name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0). Required for manual runs."
        required: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  meta:
    name: Resolve tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.t.outputs.tag }}
      version: ${{ steps.t.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - id: t
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Verify Cargo.toml version matches tag
        run: |
          TAG_VER="${{ steps.t.outputs.version }}"
          CARGO_VER=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "$TAG_VER" != "$CARGO_VER" ]; then
            echo "::error::Tag version (v$TAG_VER) does not match Cargo.toml version ($CARGO_VER)"
            echo "Run: sed -i 's/^version = .*/version = \"$TAG_VER\"/' Cargo.toml"
            exit 1
          fi
          echo "Version OK: $CARGO_VER"

  binaries:
    name: Build ${{ matrix.target }}
    needs: [meta, web-bundle]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Download web dist
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (linux-aarch64 only)
        if: matrix.cross
        run: cargo install cross --locked

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin relay-master --bin relay-node
          else
            cargo build --release --target ${{ matrix.target }} --bin relay-master --bin relay-node
          fi

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.meta.outputs.tag }}"
          NAME="relay-${TAG}-${{ matrix.target }}"
          mkdir -p "dist/$NAME"
          cp "target/${{ matrix.target }}/release/relay-master" "dist/$NAME/"
          cp "target/${{ matrix.target }}/release/relay-node"   "dist/$NAME/"
          cp README.md ROADMAP.md "dist/$NAME/" 2>/dev/null || true
          cd dist
          tar -czf "$NAME.tar.gz" "$NAME"
          shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.target }}
          path: dist/*.tar.gz*
          if-no-files-found: error

  web-bundle:
    name: Build web bundle
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
          no-cache: true

      - run: bun install --frozen-lockfile
        working-directory: web

      - run: bun run build
        working-directory: web

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.meta.outputs.tag }}"
          NAME="relay-web-${TAG}"
          mkdir -p dist
          tar -czf "dist/$NAME.tar.gz" -C web/dist .
          shasum -a 256 "dist/$NAME.tar.gz" > "dist/$NAME.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist

      - uses: actions/upload-artifact@v7
        with:
          name: web-bundle
          path: dist/*

  release:
    name: GitHub Release
    needs: [meta, binaries, web-bundle]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: '{bin-*,web-bundle}'

      - name: Flatten + checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -exec cp {} out/ \;
          cd out && shasum -a 256 *.tar.gz > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          generate_release_notes: true
          # Tags containing '-' (e.g. v0.1.3-rc.1, v0.1.3-test.5) are
          # semver pre-releases; mark them so 'latest' lookup skips them.
          prerelease: ${{ contains(needs.meta.outputs.tag, '-') }}
          files: |
            out/*.tar.gz
            out/SHA256SUMS
