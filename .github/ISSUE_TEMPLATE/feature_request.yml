name: 功能请求
description: 建议新功能或改进
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 背景 / 痛点
      description: 你遇到了什么问题，或者有什么想实现的场景？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你认为应该如何实现？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 有没有现有的 workaround，或者其他可能的实现思路？

  - type: dropdown
    id: component
    attributes:
      label: 涉及组件
      options:
        - master API
        - node 转发引擎
        - web UI
        - 安装脚本
        - 文档
        - 其他
